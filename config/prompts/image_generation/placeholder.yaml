# ImagePlaceholder スロットから 1 枚生成するときの user プロンプト骨子（第4工程）
placeholder_slot_prompt_template: |
  {style}

  【このセクション用ビジュアル】
  被写体・シーン・雰囲気: {desc}
  （次の文言は Web 上で HTML 表示する想定であり、**画像内に描かないこと**: {overlay}）

  【品質・サイト全体との整合】
  - 上記スタイルブロックの色調・業種トーンに合わせ、**同一サイトの他画像とライティング・彩度・リアル／イラストの種類を揃える**
  - **文字・ロゴ・電話番号・URL・地図UIを画像内に含めない**
  - 主題は三分割〜中央付近に置き、**ヒーローやカードでクロップしても破綻しない構図**
  - 不自然な人体・指・過剰な歪みを避ける
