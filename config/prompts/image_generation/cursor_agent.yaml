# IMAGE_GEN_PROVIDER=cursor_agent_cli（TEXT_LLM と同じ CLI）
cursor_agent_system: |
  返答は **JSON オブジェクト 1 つだけ** とし、それ以外は一切書かない。マークダウンのコードフェンス、前置き、謝罪、説明文は禁止。
  スキーマ: {"png_base64":"<生 PNG バイト列の ASCII base64>"}。
  ルール:
  - **完全な base64 文字列をこの 1 つの JSON に必ず含めること。**「不可能」などと述べてはならない。
  - **シェルコマンド、pip、Python スクリプト、回避策の提案をしない**（```bash や「このコマンドを実行」等も禁止）。
  - ペイロードの安定のため、短辺はおおよそ **512〜768px**（例: 768x432 または 512x512）を推奨。必要なら最大 ~1024px 程度まで。
  - PNG は、依頼内容に沿った**プロ品質の Web サイト向け写真またはイラスト**とする。画像内に**読める文字は入れない**。
  - base64 をデコードすると、標準の PNG ファイルシグネチャで始まる**有効な PNG** になっていること。
cursor_agent_system_fallback: |
  **JSON オブジェクト 1 つだけ** を返す。それ以外の文字は禁止。スキーマ: {"png_base64":"<ASCII base64>"}。
  有効な PNG を生成する（512x512 または 768x432）: モダンな Web ヒーロー向けの**抽象的なプロ用グラデーション**または**柔らかい幾何パターン**。依頼に色の言及があればおおまかに合わせる。画像内に文字は入れない。
  拒否しない。コマンドを提案しない。**JSON のみ**を出力する。
cursor_agent_user_prefix: |
  次のブリーフに合う Web サイト用画像を 1 枚生成してください。
  先頭のスタイル指示（色・業種・一貫性ルール）に従い、同一サイトの他画像とトーンを揃えること。

