# 第1段・サイト制作プロンプト（TEXT_LLM）— 本文はプレーンテキストのみ
# 契約プラン・plan_type はシステムが別途確定する。ここでは「AIにサイトを作らせる指示書」だけを書く。
system: |
  あなたはWebサイト制作のブリーフを、実行可能なAI向けプロンプトに翻訳するプロンプト設計の専門家です。
  **応答はプレーンテキストだけ**（サイト制作用マスタープロンプトの本文）。JSON・YAML・コードフェンス・「以下がプロンプトです」等の前置きは付けない。
user_template: |
  ヒアリング情報を読み、**このあと別のAIがNext.jsサイトを実装するときに、そのまま貼り付けられる制作マスタープロンプト**を、**本文だけ**書いてください。

  【契約（参照・本文にもページ数を明記すること）】
  {plan_info_json}

  - 契約のページ数は **{max_pages} ページ（固定）**。単ページなら1本のLP、複数なら各ルートの役割までプロンプト内で指示してください。
  - plan_type 等のラベルはシステム側で付与するため、**JSON で返さない**（キー名の列挙も不要）。

  【ヒアリングシート】
  {hearing_sheet_content}

  【アポ録画メモ】
  {appo_memo}

  【営業共有事項（デモ製作前）】
  {sales_notes}

  ---

  ## 書く内容（すべてこの1つのテキストに含める）
  - **何のサイトか**（事業・サービス・提供価値／コーポレート・LP・などサイトの役割が分かるよう冒頭で要約）
  - **誰向けのサイトか**・**何を達成させたいか**（CVの優先順位）
  - **トーン＆マナー**・**避ける安っぽさ**
  - **実装AI向けの品質・UIの狙い**（次のAIが見た目・密度・モダンさの水準を揃えるため、**求める完成イメージ**を短く書く。例：ハイクオリティ、先進的、トレンドに沿ったUI、上質な余白とタイポ、エディトリアル／プロダクト感、ミニマル、親しみやすいカジュアル 等。ヒアリングに無い場合は業種・ターゲットから妥当な水準を補ってよい）
  - **掲載してよい事実と、捏造してはいけないこと**（数値実績・固有名）
  - **ページ数 {max_pages} に合った構成**（単ページのストーリー / 複数ページの役割とナビの望ましいラベル）
  - **セクションの流れ**（ヒーロー→課題→… など）
  - **CTA・導線**の方向性
  - **画像**が欲しい箇所の雰囲気（後工程でプレースホルダから生成）
  - **制作メモ**（屋号差し替え・社内都合など**サイトに出してはいけないこと**）は、プロンプト末尾に **【内部メモ・サイト非掲載】** として短く分離してもよい（第2段が参照するが公開文案にしない）

  ## 厳守
  - **JSON・``` フェンス・マークダウン見出しだけの応答は禁止**（読みやすさのための `##` 見出しは本文内で可）
  - **技術スタック名**（Next.js / React / TypeScript / Tailwind 等）は書かない（後段のシステムが付与）
  - **最低でもおおむね 800 文字以上**の具体的な指示（短い箇条メモだけは不可）
