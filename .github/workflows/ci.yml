name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: >-
          ruff check main.py config/
          modules/case_extraction.py modules/llm/text_llm_stage.py modules/llm/basic_cp_spec.py
          modules/llm/basic_lp_spec.py modules/llm/llm_pipeline_common.py
          modules/llm/llm_output_files.py modules/phase2_text_llm_snapshot.py modules/site_implementer.py
          modules/site_build.py
          modules/spreadsheet.py modules/spreadsheet_schema.py modules/vercel_client.py
          tests/

      - name: Pytest
        run: pytest
